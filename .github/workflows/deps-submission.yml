name: Submit Gradle dependencies

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**-check.yml'
      - '**-validation.yml'
      - '**.*ignore'
      - '**.api'
      - '**.kt'
      - '**.main.kts'
      - '**.md'
      - '**.pro'
      - '**.xml'
      - '**benchmark.yml'
      - '**build.yml'

permissions:
  contents: read

jobs:
  submit:
    name: Dependencies
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    permissions: # The Dependency Submission API requires write permission
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17
        uses: Wandalen/wretry.action@e68c23e6309f2871ca8ae4763e7629b9c258e1ea # v3.8.0
        timeout-minutes: 5
        with:
          action: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
          with: |
            cache: gradle
            distribution: temurin
            java-version: 17
          attempt_limit: 3
          attempt_delay: 2000

      - name: Disable configuration cache
        run: sed -i 's/org.gradle.configuration-cache=true/org.gradle.configuration-cache=false/' gradle.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          cache-read-only: true

      - name: Submit Gradle Dependency Graph
        uses: mikepenz/gradle-dependency-submission@f9bd3bb4b3b348357f775517814f954ded2badd1 # v1.0.0
        with:
          gradle-build-module: |-
            :
            :fluxo-common
            :fluxo-core
            :fluxo-data
            :benchmarks:jmh
          include-build-environment: false
          sub-module-mode: INDIVIDUAL_DEEP
