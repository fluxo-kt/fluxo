name: Release

# Tag-triggered release of the fluxo libraries to Maven Central (Central Portal).
#
# Cut a release by setting the non-SNAPSHOT version in gradle/libs.versions.toml
# (`version = "X.Y.Z"`), committing, then pushing a matching `vX.Y.Z` tag. Publishing
# is 100% vanniktech maven-publish → Central Portal (OSSRH is retired); releases are
# PGP-signed (the harness marks signing required for non-snapshot versions), so all
# four secrets below must be present. Snapshots publish unsigned from build.yml on
# main pushes — this workflow is releases only.
#
# Required repository secrets (maintainer-provisioned; GitHub Settings → Secrets):
#   MAVEN_CENTRAL_USERNAME / MAVEN_CENTRAL_PASSWORD  Central Portal user token
#   SIGNING_KEY                                      ASCII-armored PGP private key block
#   SIGNING_PASSWORD                                 passphrase for SIGNING_KEY
# vanniktech derives the signing key id from the armored block; no separate SIGNING_KEY_ID is
# read. SIGNING_KEY must contain real newlines (the armored block verbatim). If stored with
# escaped "\n", normalize it first — see fluxo-kmp-conf's export-release-signing-key.sh.

on:
  push:
    tags:
      - "v*"

permissions:
  # `contents: write` is needed for the GitHub Release asset upload step
  # (Sigstore bundles + CycloneDX SBOMs). All other jobs run read-only.
  contents: write

env:
  CI: true
  RELEASE: true
  BUILD_NUMBER: ${{ github.run_number }}
  GRADLE_OPTS: "\
  -Dorg.gradle.daemon=false \
  -Dorg.gradle.configuration-cache=false \
  -Dorg.gradle.vfs.watch=false \
  "

jobs:
  publish:
    name: Publish release to Maven Central
    if: github.repository == 'fluxo-kt/fluxo'
    runs-on: macos-latest
    timeout-minutes: 55
    env:
      SCM_TAG: ${{ github.ref_name }}
      # Vanniktech reads these as Gradle project properties.
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          cache-read-only: true

      - name: Verify release secrets
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          missing=()
          for name in MAVEN_CENTRAL_USERNAME MAVEN_CENTRAL_PASSWORD SIGNING_KEY SIGNING_PASSWORD; do
            [[ -n "${!name}" ]] || missing+=("$name")
          done
          if (( ${#missing[@]} > 0 )); then
            printf '::error::Missing required release secrets: %s\n' "${missing[*]}"
            exit 1
          fi
          if [[ "$SIGNING_KEY" != *"BEGIN PGP PRIVATE KEY BLOCK"* ]]; then
            echo "::error::SIGNING_KEY must be the ASCII-armored private PGP key block."
            exit 1
          fi

      - name: Verify tag matches the release version
        # Fail fast before the build: the resolved Gradle version (single source of
        # truth) must equal the tag and must not be a snapshot — otherwise a v* tag
        # would publish a mismatched or unsigned-snapshot artifact.
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(./gradlew -q :fluxo-core:properties | awk -F': ' '/^version:/ {print $2; exit}')"
          if [[ "$version" != "$tag" ]]; then
            echo "::error::Tag v$tag != project version '$version'. Set the 'version' key in gradle/libs.versions.toml, then re-tag."
            exit 1
          fi
          if [[ "$version" == *SNAPSHOT* ]]; then
            echo "::error::Refusing to release SNAPSHOT version '$version' on a v* tag."
            exit 1
          fi

      - name: Verify release build (API + check)
        run: >
          ./gradlew apiCheck androidApiCheck build assemble check
          --no-configuration-cache --stacktrace --scan

      - name: Generate CycloneDX SBOMs
        # Per-module Software Bill of Materials. CycloneDX 3.x emits dual scopes
        # — `build/reports/cyclonedx/bom.{json,xml}` (full transitive) and
        # `build/reports/cyclonedx-direct/bom.{json,xml}` (direct deps only).
        # `./gradlew cyclonedxBom` aggregates across every subproject that applies
        # the plugin, so adding a new library module needs no edit here.
        # Sigstore signing is auto-attached to every MavenPublication by the
        # `dev.sigstore.sign` plugin and runs as a dependency of the publish step
        # below — no extra invocation needed; the bundles land in the staged
        # publication directory (`build/repo/.../<artifact>-<version>.sigstore.json`).
        run: >
          ./gradlew cyclonedxBom
          --no-configuration-cache --stacktrace

      - name: Publish release to Maven Central
        run: >
          ./gradlew publishAndReleaseToMavenCentral
          --no-configuration-cache --stacktrace --scan

      - name: Collect supply-chain artefacts (SBOMs + Sigstore bundles)
        # Flatten the per-module SBOMs and Sigstore bundles into a single staging
        # directory so the Release step can upload them as a single asset glob.
        # CycloneDX 3.x emits both `cyclonedx/` (full transitive) and
        # `cyclonedx-direct/` (direct-deps only) reports — upload both renamed by
        # module + scope so they survive co-location on the GH Release page.
        run: |
          set -euo pipefail
          stage="$RUNNER_TEMP/release-assets"
          mkdir -p "$stage"
          for mod in fluxo-core fluxo-common fluxo-data; do
            for scope in cyclonedx cyclonedx-direct; do
              for ext in json xml; do
                src="$mod/build/reports/$scope/bom.$ext"
                if [[ -f "$src" ]]; then
                  cp "$src" "$stage/${mod}-${scope}.${ext}"
                fi
              done
            done
          done
          # Sigstore bundles land alongside artefacts in the staged publication tree.
          # Globs match both `*.sigstore.json` (current default) and legacy `*.sigstore`.
          find . -type f \( -name '*.sigstore.json' -o -name '*.sigstore' \) \
            -not -path './.git/*' -exec cp -n {} "$stage/" \;
          ls -la "$stage"
          # Sanity: at least one SBOM per module must exist or release is incomplete.
          for mod in fluxo-core fluxo-common fluxo-data; do
            ls "$stage/${mod}-cyclonedx.json" >/dev/null \
              || { echo "::error::missing CycloneDX SBOM for $mod"; exit 1; }
          done

      - name: Attach supply-chain artefacts to GitHub Release
        # Creates (or updates) the GH Release for this tag and uploads SBOMs +
        # Sigstore bundles as assets. `make_latest: legacy` lets the repo's
        # release-ordering config decide latest (don't force on every tag).
        uses: softprops/action-gh-release@2bb465e97f322d3cb2a965294d483e0d26a67aa9 # v3.0.1
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ runner.temp }}/release-assets/*
          fail_on_unmatched_files: false
          generate_release_notes: true
