name: Build

on:
  pull_request:
    paths-ignore:
      - '**-check.yml'
      - '**-submission.yml'
      - '**-validation.yml'
      - '**.*ignore'
      - '**.md'
      - '**.txt'
      - '**benchmark.yml'
      - '**dependabot.yml'
  push:
    paths-ignore:
      - '**-check.yml'
      - '**-submission.yml'
      - '**-validation.yml'
      - '**.*ignore'
      - '**.md'
      - '**.txt'
      - '**benchmark.yml'
      - '**dependabot.yml'

concurrency:
  # Per-branch lane: a second push to the same ref pre-empts an in-flight build.
  # `cancel-in-progress: true` keeps CI minutes bounded for fast-iterating PRs.
  # Tags get a unique ref so release builds never race themselves.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  BUILD_NUMBER: ${{ github.run_number }}
  SCM_TAG: ${{ github.sha }}
  GRADLE_OPTS: "\
  -Dorg.gradle.configuration-cache=false \
  -Dorg.gradle.vfs.watch=false \
  "

jobs:
  commitlint:
    # Conventional-Commits enforcement on PR commits. Rules in `.commitlintrc.yml`.
    # PRs only — for direct pushes to a branch there is no incremental commit
    # range to lint, and the maintainer already reviewed the commit body.
    name: Lint commit messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # `fetch-depth: 0` so commitlint can see the full PR commit range.
          fetch-depth: 0

      - name: Lint PR commits
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
        env:
          NODE_PATH: ${{ github.workspace }}/node_modules
        with:
          configFile: .commitlintrc.yml
          helpURL: https://www.conventionalcommits.org/

  os-checks:
    strategy:
      fail-fast: false
      matrix:
        java: [ '17' ]
        os: [ 'macos-latest', 'windows-latest', 'ubuntu-latest' ]

    name: 'Test on ${{ matrix.os }} JDK ${{ matrix.java }}'
    timeout-minutes: 55
    runs-on: ${{ matrix.os }}
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}

    steps:
      - name: Harden Runner
        if: matrix.os == 'ubuntu-latest'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 'Set up JDK ${{ matrix.java }}'
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: 'temurin'
          java-version: '${{ matrix.java }}'

      - name: 'Set up NodeJS 18 (LTS)'
        if: matrix.os != 'windows-latest'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 18

      - name: 'Cache Konan (Kotlin/Native compiler)'
        timeout-minutes: 6
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        continue-on-error: true
        with:
          path: |
            ~/.konan
            /Users/runner/.konan
          key: ${{ runner.os }}-konan-${{ hashFiles('**/*.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-konan-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          cache-read-only: ${{ (github.ref != 'refs/heads/main' && github.ref != 'refs/heads/dev') || matrix.java != '17' }}
          # Native replacement for the old custom build-scan PR-comment step (which referenced a
          # non-existent step id and always rendered empty). Posts the build report on PR failure.
          add-job-summary-as-pr-comment: on-failure

      - name: 'Build and check on ${{ matrix.os }} (complete, non-release)'
        id: check
        if: matrix.os != 'windows-latest'
        timeout-minutes: 50
        run: ./gradlew build assemble check --stacktrace --continue --scan

      - name: 'Build and check on ${{ matrix.os }} (split_targets, release)'
        if: matrix.os == 'windows-latest'
        timeout-minutes: 35
        env:
          RELEASE: true
        run: ./gradlew build assemble check -Dsplit_targets --stacktrace --continue --scan --no-daemon

      - name: Summary
        if: success() || failure()
        continue-on-error: true
        run: ./.github/workflows/summary.main.kts >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Upload code coverage
        if: (success() || failure()) && !contains(github.event.head_commit.message, 'coverage skip')
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
        env:
          OS: ${{ matrix.os }}
          JAVA_VERSION: ${{ matrix.java }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/reports/kover-merged-report.xml
          env_vars: OS,JAVA_VERSION
          flags: 'unit-tests,${{ matrix.os }}'
          name: 'codecov-${{ matrix.os }}'
          fail_ci_if_error: false

      - name: Upload reports
        if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        continue-on-error: true
        with:
          name: 'reports-${{ matrix.os }}'
          path: |
            **/build/reports/
            !**/build/reports/configuration-cache/
            !**/build/reports/dependency-analysis/

      - name: Upload merged sarif (Lint)
        if: (success() || failure()) && matrix.os == 'macos-latest'
          && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        continue-on-error: true
        with:
          sarif_file: build/lint-merged.sarif
          category: lint

      - name: Upload merged sarif (Detekt)
        if: (success() || failure()) && matrix.os == 'macos-latest'
          && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev')
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        continue-on-error: true
        with:
          sarif_file: build/detekt-merged.sarif
          category: detekt

      - name: Publish JUnit test results as a pull request check
        if: (success() || failure()) && matrix.os == 'macos-latest'
          && github.repository == 'fluxo-kt/fluxo' && github.ref == 'refs/heads/main'
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16 # v6
        with:
          report_paths: '**/build/test-results/*/TEST-*.xml'

      - name: 'Check release API and publish SNAPSHOT'
        id: snapshot
        if: matrix.os == 'macos-latest' && matrix.java == '17'
          && steps.check.outcome == 'success'
          && github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'fluxo-kt/fluxo'
        env:
          # Vanniktech reads Central Portal credentials from these Gradle-property
          # env vars (ORG_GRADLE_PROJECT_*). The previous OSSRH_* names reached the
          # runner but were never read by the plugin, so snapshots never published.
          # Snapshots are published unsigned — the harness sets signing isRequired
          # only for non-snapshot versions (SetupVanniktechPublication.kt) — so no
          # signing key is needed on this path; releases sign via release.yml.
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          RELEASE: true
        run: ./gradlew apiCheck androidApiCheck publishToMavenCentral -DDISABLE_TESTS --rerun-tasks --stacktrace --scan

      - name: 'Check release API on ${{ matrix.os }}'
        if: matrix.os != 'windows-latest' && steps.snapshot.outcome == 'skipped'
        env:
          RELEASE: true
        run: ./gradlew apiCheck androidApiCheck --stacktrace --scan
