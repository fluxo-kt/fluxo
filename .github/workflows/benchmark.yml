name: Benchmark

on:
  schedule:
    - cron: '0 7 * * 2'
  push:
    paths:
      - '**/**Benchmark.kt'
      - '**/benchmark-summary.main.kts'
      - '**/benchmark.yml'

concurrency:
  # JMH runs are long; a second push to the same ref preempts the previous one
  # so we don't pay for two stale runs racing. Scheduled cron uses ref=main, so
  # cancel-in-progress also stops a manually-triggered run if cron starts.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TRIGGER_COUNTER: 15
  JMH_THREADS: 2
  GRADLE_OPTS: "-Dorg.gradle.daemon=false \
  -Dorg.gradle.configuration-cache=false \
  -Dorg.gradle.vfs.watch=false \
  "

jobs:
  os-checks:
    strategy:
      fail-fast: false
      matrix:
        # TODO: Benchmark on different JDK distributions?
        #  https://www.ojalgo.org/2019/02/quick-test-to-compare-hotspot-and-openj9/
        java: [ '17' ]
        os: [ 'macos', 'windows', 'ubuntu' ]
        benchmark: [ 'IncrementIntent.*' ]

    name: '${{ matrix.os }} JDK${{ matrix.java }} "${{ matrix.benchmark }}" benchmark'
    runs-on: '${{ matrix.os }}-latest'

    steps:
      - name: Harden Runner
        if: matrix.os == 'ubuntu'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: 'Set up JDK ${{ matrix.java }}'
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: 'temurin'
          java-version: '${{ matrix.java }}'

      # macos runner provides more CPU cores.
      - if: matrix.os == 'macos'
        run: echo "JMH_THREADS=3" >> "$GITHUB_ENV"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          cache-disabled: ${{ matrix.java == '11' }}
          cache-read-only: ${{ github.ref != 'refs/heads/main' || matrix.java != '17' }}

      # setup-gradle@v4+ dropped the `arguments:` input — run Gradle in a dedicated step.
      # jmh is configuration-cache-incompatible, hence the explicit `--no-configuration-cache`.
      - name: 'Benchmark "${{ matrix.benchmark }}" on ${{ matrix.os }} JDK${{ matrix.java }}'
        env:
          CI: true
          jmh: '${{ matrix.benchmark }}'
          jmh_wi: 1
          jmh_i: 6
          jmh_f: 2
          jmh_t: '${{ env.JMH_THREADS }}'
        run: ./gradlew jmh --stacktrace --no-configuration-cache --scan

      - name: Summary
        run: ./.github/workflows/benchmark-summary.main.kts >> "$GITHUB_STEP_SUMMARY"
        shell: bash
