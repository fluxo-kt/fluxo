# Conventional Commits enforcement for fluxo PRs.
# Wired into build.yml via wagoid/commitlint-github-action.

extends:
  - '@commitlint/config-conventional'

rules:
  # Allowed `type` values. Numeric prefix `2` means error (block PR).
  # Add new types here when a new category emerges; do not silently expand.
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - test
      - build
      - ci
      - docs
      - perf
      - refactor
      - style
      - chore
      - i18n
      - deps
      - revert

  # Title hygiene: block sloppy ALLCAPS / Title Case / PascalCase / Sentence case
  # subjects while permitting acronyms (JMH, KMP, API, BCV, AGP, KSP, JS, KLib, …)
  # inside otherwise-lowercase subjects. This is `@commitlint/config-conventional`'s
  # default; the previous strict `[always, lower-case]` rule rejected acronyms,
  # which conflicts with the de facto repo convention visible in `git log` and the
  # `jmh-baseline-bootstrap.yml` workflow's hardcoded subject.
  subject-case:
    - 2
    - never
    - - sentence-case
      - start-case
      - pascal-case
      - upper-case
  subject-max-length:
    - 2
    - always
    - 72
  # Conventional-commits spec: subject must end with no period.
  subject-full-stop:
    - 2
    - never
    - '.'

  # Body hygiene.
  body-max-line-length:
    - 2
    - always
    - 100

  # Footer hygiene: blank line before any trailer block (Co-authored-by, etc.).
  footer-leading-blank:
    - 2
    - always
